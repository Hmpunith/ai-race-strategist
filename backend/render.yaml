# Render deployment config
services:
  - type: web
    name: ai-race-strategist-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: GRANITE_MODEL
        value: ibm-granite/granite-3.2-8b-instruct
      - key: PYTHON_VERSION
        value: 3.11.0
